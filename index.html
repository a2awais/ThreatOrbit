<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ThreatOrbit — Nation-State APT Intelligence Globe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">

  <!-- Three.js importmap — MUST come before any module scripts -->
  <script type="importmap">
  {
    "imports": {
      "three":         "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.min.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
    }
  }
  </script>

  <!-- CDN timeout: if Three.js takes >12s to load, show helpful error -->
  <script>
    window._orbitTimeout = setTimeout(() => {
      const el = document.getElementById('globe-loading');
      if (el && el.style.display !== 'none') {
        el.innerHTML = `
          <div style="text-align:center;padding:32px;max-width:380px">
            <div style="font-family:'IBM Plex Mono',monospace;font-size:13px;color:#e06060;margin-bottom:12px">
              Three.js CDN is taking too long
            </div>
            <div style="font-size:12px;color:#5a7a96;line-height:1.9">
              The globe requires Three.js from cdn.jsdelivr.net.<br>
              Check your internet connection and refresh.<br><br>
              If on a restricted network, try a different connection.
            </div>
          </div>`;
      }
    }, 12000);
  </script>
</head>
<body>

  <!-- ── TOP BAR ──────────────────────────────────────────────── -->
  <header class="topbar">
    <div class="tb-brand">
      <svg class="tb-logo" viewBox="0 0 32 32" fill="none">
        <rect x="1.5" y="1.5" width="29" height="29" rx="3" stroke="#4da6e8" stroke-width="1" opacity=".3"/>
        <circle cx="16" cy="16" r="11" fill="none" stroke="#4da6e8" stroke-width="1" opacity=".5"/>
        <ellipse cx="16" cy="16" rx="5" ry="11" fill="none" stroke="#4da6e8" stroke-width="1" opacity=".4"/>
        <line x1="5" y1="16" x2="27" y2="16" stroke="#4da6e8" stroke-width=".8" opacity=".4"/>
        <circle cx="16" cy="16" r="2.5" fill="#4da6e8"/>
      </svg>
      <div>
        <div class="tb-name">ThreatOrbit</div>
        <div class="tb-desc">Nation-State APT Intelligence · Open Source</div>
      </div>
    </div>

    <div class="tb-div"></div>

    <div class="tb-search">
      <svg class="tb-search-ico" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
      </svg>
      <input id="g-search" type="text" placeholder="Search groups, malware, CVEs…" autocomplete="off">
    </div>

    <div class="chips" id="mot-chips">
      <span class="chip" data-mot="espionage">Espionage</span>
      <span class="chip" data-mot="financial">Financial</span>
      <span class="chip" data-mot="destructive">Destructive</span>
      <span class="chip" data-mot="mixed">Mixed</span>
    </div>

    <div class="tb-stats">
      <div class="tb-stat"><span class="tb-stat-val" id="s-groups">—</span><span class="tb-stat-lbl">groups</span></div>
      <div class="tb-stat"><span class="tb-stat-val" id="s-nations">12</span><span class="tb-stat-lbl">nations</span></div>
      <div class="tb-stat"><span class="tb-stat-val" id="s-cves">—</span><span class="tb-stat-lbl">CVEs</span></div>
    </div>
  </header>

  <!-- ── BODY ────────────────────────────────────────────────── -->
  <div class="body">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sb-scroll">
        <div class="sb-sec">
          <div class="sb-sec-title">Nation-State</div>
          <div id="c-list" class="c-list"></div>
        </div>
        <div class="sb-sec">
          <div class="sb-sec-title">Legend</div>
          <div id="legend-content"></div>
        </div>
      </div>
    </aside>

    <!-- GLOBE CANVAS -->
    <main class="globe-wrap">
      <div id="globe-loading" class="loading">
        <div class="loading-spinner"></div>
        <div class="loading-text">Loading Three.js &amp; globe data…</div>
      </div>
      <canvas id="globe-canvas"></canvas>
      <div id="tooltip" class="tooltip"></div>
    </main>

    <!-- GROUP DETAIL PANEL -->
    <aside class="detail" id="detail">
      <div class="dp-head">
        <div class="dp-titles">
          <div class="dp-name" id="dp-name"></div>
          <div class="dp-sub"  id="dp-sub"></div>
        </div>
        <button class="dp-close" id="dp-close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <path d="M18 6 6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <div class="dp-body" id="dp-body"></div>
    </aside>

  </div>

  <!-- App module — loads after importmap is registered -->
  <script type="module">
    // Clear CDN timeout once modules begin loading successfully
    import('./js/app.js').then(() => {
      clearTimeout(window._orbitTimeout);
    }).catch(err => {
      clearTimeout(window._orbitTimeout);
      const el = document.getElementById('globe-loading');
      if (el) el.innerHTML = `
        <div style="text-align:center;padding:32px;max-width:420px">
          <div style="font-family:'IBM Plex Mono',monospace;font-size:13px;color:#e06060;margin-bottom:12px">Module load failed</div>
          <div style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:#5a7a96;line-height:1.8;word-break:break-all">${err.message}</div>
          <div style="font-size:11px;color:#5a7a96;margin-top:14px">Open DevTools (F12) → Console for details.</div>
        </div>`;
    });
  </script>

</body>
</html>
